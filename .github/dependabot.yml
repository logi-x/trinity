version: 2
# All version-update PRs target `dev` per the SDLC (feature → dev → main).
# Note: Dependabot reads this file from the DEFAULT branch (main), so changes
# here only take effect after a release cut.
#
# SECURITY updates ignore `target-branch` and ALWAYS open against the default
# branch (main) by GitHub design — `target-branch: dev` cannot redirect them,
# and closing such a PR just makes Dependabot recreate it against main. So a
# Dependabot *security* PR against `main` is EXPECTED, not a config misroute
# (see #1341): let it merge to main as a security fix and it reaches dev on the
# next release back-merge, or cherry-pick the bump into a dev PR if urgent.
# Only *version* updates honor the per-entry `target-branch: dev` below.
updates:
  # GitHub Actions: catch new SHAs for already-pinned third-party actions and
  # flag CVEs in first-party actions. Weekly cadence — security PRs from
  # Dependabot are auto-grouped by ecosystem so review burden stays low.
  - package-ecosystem: github-actions
    directory: /
    target-branch: dev
    schedule:
      interval: weekly
    labels:
      - dependencies
      - github-actions
    groups:
      # One PR per week for all action bumps, not one PR per action (#1243).
      github-actions:
        patterns:
          - "*"

  # Frontend (Vite + Vue): catches Vue / Vite / Chart.js / DOMPurify CVEs.
  - package-ecosystem: npm
    directory: /src/frontend
    target-branch: dev
    schedule:
      interval: weekly
    labels:
      - dependencies
      - frontend
    groups:
      patch-and-minor:
        update-types:
          - patch
          - minor

  # Backend (FastAPI). Trinity's existing Dependabot guidance (referenced in
  # the security report's supply_chain_summary note) flows through PR #793 —
  # this entry continues that cadence.
  - package-ecosystem: pip
    directory: /src/backend
    target-branch: dev
    schedule:
      interval: weekly
    labels:
      - dependencies
      - backend
    groups:
      patch-and-minor:
        update-types:
          - patch
          - minor

  # MCP server (TypeScript).
  - package-ecosystem: npm
    directory: /src/mcp-server
    target-branch: dev
    schedule:
      interval: weekly
    labels:
      - dependencies
      - mcp-server
    groups:
      patch-and-minor:
        update-types:
          - patch
          - minor

  # git-sync test harness (#1243): previously uncovered, which left esbuild CVEs
  # here (alert #152) only reachable via security updates against main.
  - package-ecosystem: npm
    directory: /tests/git-sync
    target-branch: dev
    schedule:
      interval: weekly
    labels:
      - dependencies
    groups:
      patch-and-minor:
        update-types:
          - patch
          - minor

  # Docker base images (#850): flag CVEs in FROM lines — the Python/Node
  # agent base, backend, frontend (incl. Dockerfile.prod), nginx, scheduler.
  # Dependabot scans every Dockerfile under each listed directory. Grouped
  # so a single review covers a base-image bump across services.
  - package-ecosystem: docker
    directories:
      - /docker/base-image
      - /docker/backend
      - /docker/frontend
      - /docker/scheduler
    target-branch: dev
    schedule:
      interval: weekly
    labels:
      - dependencies
      - docker
    groups:
      docker-base-images:
        patterns:
          - "*"
