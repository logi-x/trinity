# Security headers — included in every nginx location block that has its own add_header.
# nginx drops server-level add_header when a location block defines its own,
# so this file must be included in every such location block.
#
# HSTS (#549): emitted only when the upstream reverse proxy / TLS terminator
# (cloudflare, traefik, external nginx) signals HTTPS via X-Forwarded-Proto.
# This nginx listens on :8080 inside the container (#874, unprivileged image;
# host-side port 80 mapping lives in docker-compose.prod.yml) and never sees
# the TLS wire directly. The `map` for $hsts_header lives in nginx.conf so the
# conditional logic is evaluated once per request, not per add_header directive.
#
# COEP (Cross-Origin-Embedder-Policy) is intentionally omitted: require-corp would
# break any future cross-origin resources. No SharedArrayBuffer usage to justify it.
#
# CSP blob: note (#1400): connect-src, media-src, object-src AND frame-src MUST
# include blob:. The Files-tab preview/download fetch(URL.createObjectURL(blob))
# (connect-src) and render blob: URLs via <img> (img-src), <video>/<audio>
# (media-src), and PDF <embed> — which needs BOTH object-src (the element) and
# frame-src (Chrome renders the embedded PDF in an internal viewer frame; without
# frame-src it falls back to default-src 'self' and Chrome shows "This content is
# blocked"). Removing blob: from any of these silently breaks file preview — keep
# this file in sync with the mirrored dev CSP in vite.config.js.

add_header X-Frame-Options "SAMEORIGIN" always;
add_header X-Content-Type-Options "nosniff" always;
add_header X-XSS-Protection "0" always;
add_header Referrer-Policy "strict-origin-when-cross-origin" always;
add_header Permissions-Policy "camera=(), microphone=(self), geolocation=(), payment=()" always;
add_header Cross-Origin-Opener-Policy "same-origin" always;
add_header Cross-Origin-Resource-Policy "same-origin" always;
add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; media-src 'self' blob:; font-src 'self'; connect-src 'self' blob: ws: wss: https://us-central1-mcp-server-project-455215.cloudfunctions.net https://intake.abilityai.dev; object-src 'self' blob:; frame-src 'self' blob:; frame-ancestors 'self'; base-uri 'self'; form-action 'self'" always;
add_header Strict-Transport-Security $hsts_header always;
