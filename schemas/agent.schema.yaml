$schema: https://json-schema.org/draft/2020-12/schema
$id: https://logix.com/schemas/agent.schema.yaml

title: Logix Agent Configuration
description: Schema for Logix agent definitions (template.yaml)
type: object
additionalProperties: false

required:
  - name
  - display_name
  - description
  - type
  - version
  - capabilities
  - commands
  - resources

properties:
  name:
    type: string
    minLength: 1
    # Kebab-case agent id (matches template directory convention)
    pattern: '^[a-z0-9]+(-[a-z0-9]+)*$'
    examples:
      - my-agent
      - logix-system

  display_name:
    type: string
    minLength: 1

  description:
    type: string
    minLength: 1

  type:
    type: string
    minLength: 1
    examples:
      - business-assistant
      - knowledge-base
      - system-orchestrator

  version:
    type: string
    pattern: '^\d+\.\d+\.\d+$'
    examples:
      - 1.0.0

  capabilities:
    type: array
    minItems: 1
    uniqueItems: true
    items:
      type: string
      minLength: 1

  # Catalog metadata for Info panel; empty list is allowed (many templates)
  commands:
    type: array
    items:
      type: object
      additionalProperties: false
      required:
        - name
        - description
      properties:
        name:
          type: string
          # Full slash command as injected into chat when usage is omitted
          # e.g. /research | /ops/schedules/resume
          pattern: '^/[a-zA-Z][a-zA-Z0-9_-]*(/[a-zA-Z][a-zA-Z0-9_-]*)*$'
        description:
          type: string
          minLength: 1
        usage:
          type: string
          description: >
            Optional richer invocation hint prefilling chat on click
            (e.g. "/ops/restart <agent-name>"). Falls back to name as-is.
          examples:
            - "/route [task-id] [arguments]"
            - "/ops/restart <agent-name>"
            - "/research [topic]"

  resources:
    type: object
    additionalProperties: false
    required:
      - cpu
      - memory
    properties:
      cpu:
        type: string
        # Docker-style core count (stringified int) or millicores with m
        pattern: '^(\d+|(\d+)m)$'
        examples:
          - "1"
          - "2"
          - "4"
          - 500m
      memory:
        type: string
        # Docker mem_limit style used by Trinity (normalize_memory)
        pattern: '^\d+[gm]$'
        examples:
          - 512m
          - 2g
          - 4g
          - 8g

  hidden:
    type: boolean
    default: false
    description: Exclude from user-facing template catalog (GET /api/templates)

  priority:
    type: integer
    minimum: 0
    default: 20
    description: Sort order in catalog (lower = first)

  author:
    type: string
    default: Logix

  updated:
    type: string
    format: date
    examples:
      - 2026-07-19

  tagline:
    type: string

  avatar_prompt:
    type: string
    description: Prompt used for avatar image generation

  use_cases:
    type: array
    uniqueItems: true
    items:
      type: string
      minLength: 1

  runtime:
    type: object
    additionalProperties: false
    required:
      - type
      - model
    properties:
      type:
        type: string
        enum:
          - claude
          - claude-code
          - codex
          - gemini-cli
          - gpt
          - llama
          - deepseek
          - grok
          - ollama
          - openai
          - anthropic
          - google
          - azure
          - aws
          - huggingface
          - cohere
          - vercel
          - openrouter
      model:
        type: string
        minLength: 1
        description: Model id for the chosen runtime (not a closed enum — IDs change often)
        examples:
          - gpt-5.1-codex
          - gemini-3-flash
          - claude-sonnet-4-5

  # Operator-approved Docker networks (must be in AGENT_ADDITIONAL_NETWORK_ALLOWLIST)
  additional_networks:
    type: array
    uniqueItems: true
    maxItems: 8
    items:
      type: string
      minLength: 1
    examples:
      - - my-project-shared-network

  # Runtime data under data/ (#1169) — materialized + gitignored at create
  data_paths:
    type: array
    uniqueItems: true
    items:
      type: string
      minLength: 1
    examples:
      - - data/**
      - - data/app.sqlite

  # Paths preserved across git resets (defaults applied if omitted)
  persistent_state:
    type: array
    uniqueItems: true
    items:
      type: string
      minLength: 1

  # Agent tool allowlist (AgentConfig.tools); also shown on Info panel
  tools:
    type: array
    uniqueItems: true
    items:
      type: string
      minLength: 1
    examples:
      - - filesystem
        - web_search

  # Display-only platform tags on Info panel
  platforms:
    type: array
    uniqueItems: true
    items:
      type: string
      minLength: 1
    examples:
      - - trinity
        - local

  # Explicit credential list for catalog badges (often derived at scan time)
  required_credentials:
    type: array
    items:
      oneOf:
        - type: string
          minLength: 1
        - type: object
          additionalProperties: false
          required:
            - name
          properties:
            name:
              type: string
              minLength: 1
            source:
              type: string

  # Template declaration — string "required" forces fork-to-own at create
  fork_to_own:
    type: string
    const: required

  sub_agents:
    type: array
    items:
      type: object
      additionalProperties: false
      required:
        - name
        - description
      properties:
        name:
          type: string
          pattern: '^[a-zA-Z][a-zA-Z0-9_-]*$'
        description:
          type: string
          minLength: 1

  credentials:
    type: object
    additionalProperties: false
    properties:
      mcp_servers:
        type: object
        additionalProperties:
          type: object
          additionalProperties: false
          properties:
            env_vars:
              type: array
              uniqueItems: true
              items:
                type: string
        propertyNames:
          type: string
          pattern: '^[a-zA-Z][a-zA-Z0-9_-]*$'
      env_file:
        type: array
        uniqueItems: true
        items:
          type: string

  skills:
    type: array
    items:
      type: object
      additionalProperties: false
      required:
        - name
        - description
      properties:
        name:
          type: string
          pattern: '^[a-zA-Z][a-zA-Z0-9_-]*$'
        description:
          type: string
          minLength: 1

  shared_folders:
    type: object
    additionalProperties: false
    required:
      - expose
      - consume
    properties:
      expose:
        type: boolean
        default: true
      consume:
        type: boolean
        default: true

  # Info-panel / catalog MCP list — string name OR {name, description}
  mcp_servers:
    type: array
    uniqueItems: true
    items:
      oneOf:
        - type: string
          minLength: 1
          pattern: '^[a-zA-Z][a-zA-Z0-9_-]*$'
        - type: object
          additionalProperties: false
          required:
            - name
            - description
          properties:
            name:
              type: string
              pattern: '^[a-zA-Z][a-zA-Z0-9_-]*$'
            description:
              type: string
              minLength: 1

  git:
    type: object
    additionalProperties: false
    properties:
      push_enabled:
        type: boolean
        default: false
      commit_paths:
        type: array
        uniqueItems: true
        items:
          type: string
          minLength: 1
      ignore_paths:
        type: array
        uniqueItems: true
        items:
          type: string
          minLength: 1

  planning:
    type: object
    additionalProperties: false
    properties:
      enabled:
        type: boolean
        default: false
      max_active_plans:
        type: integer
        minimum: 1
      default_task_timeout_minutes:
        type: integer
        minimum: 1
      auto_checkpoint:
        type: boolean
        default: false

  metrics:
    type: array
    items:
      type: object
      additionalProperties: false
      required:
        - name
        - type
        - label
      properties:
        name:
          type: string
          minLength: 1
        type:
          type: string
          enum:
            - counter
            - gauge
            - percentage
            - status
            - duration
            - bytes
        label:
          type: string
          minLength: 1
        description:
          type: string
        unit:
          type: string
          minLength: 1
        warning_threshold:
          type: number
          description: Percentage metric — yellow below this value
        critical_threshold:
          type: number
          description: Percentage metric — red below this value
        values:
          type: array
          description: Required for status metrics (badge color + label)
          items:
            type: object
            additionalProperties: false
            required:
              - value
              - color
              - label
            properties:
              value:
                type: string
              color:
                type: string
                enum:
                  - green
                  - red
                  - yellow
                  - gray
                  - blue
                  - orange
              label:
                type: string

  schedules:
    type: array
    description: >
      Optional default schedules seeded when the agent is created
      (system manifests / template deploy). Overridable at deploy time.
    items:
      type: object
      additionalProperties: false
      required:
        - name
        - cron
        - message
      properties:
        name:
          type: string
          minLength: 1
        cron:
          type: string
          minLength: 1
          description: Cron expression (5-field)
          examples:
            - "0 */4 * * *"
            - "0 9 * * *"
        message:
          type: string
          minLength: 1
          description: Message sent to the agent on tick (usually a slash command)
          examples:
            - "/research"
            - "/briefing"
        description:
          type: string
        timezone:
          type: string
          default: UTC
          examples:
            - UTC
            - America/New_York
        enabled:
          type: boolean
          default: true
