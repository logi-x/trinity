name: "logix-system"
# Excluded from the user-facing template catalog (GET /api/templates). See README "Not starting points". (#1513)
hidden: true
display_name: Logix System Agent
description: Platform operations manager responsible for agent health, lifecycle, resource governance, and schedule control. Auto-deployed, deletion-protected, with full access to all Trinity MCP tools.
version: "1.1.0"
author: Logix Platform
priority: 1  # System template - always first

type: system-orchestrator

resources:
  cpu: "4"
  memory: "4g"

capabilities:
  - health-monitoring
  - lifecycle-management
  - resource-governance
  - schedule-control
  - fleet-operations
  - platform-alerting
  - compliance-auditing

use_cases:
  - "Show me fleet status — which agents are running, stopped, or stuck, and their recent activity"
  - "Run a health check and recommend what to restart or investigate"
  - "Restart a specific agent cleanly after a crash or stuck session"
  - "Pause all schedules before maintenance, then resume them when the platform is healthy"
  - "List recent task executions and dig into a failed run by execution id"
  - "Report platform spend and token cost trends from OTel metrics"
  - "Audit every agent for Trinity compatibility and summarize gaps"
  - "Ask agents to self-check MCP, credentials, and workspace setup without changing anything"
  - "Refresh the platform dashboard with current agent, schedule, and cost metrics"
  - "Help design a multi-step process YAML — pick agents, approval gates, and notifications"

mcp_servers: []

credentials: {}

commands:
  # Fleet Operations
  - name: /ops/status
    description: Fleet status report - all agents with status, context, activity
  - name: /ops/health
    description: Health check - identify unhealthy agents with recommendations
  - name: /ops/restart
    description: Restart a specific agent
    usage: "/ops/restart <agent-name>"
  - name: /ops/restart-all
    description: Restart all agents (use with caution)
  - name: /ops/stop
    description: Stop a specific agent
    usage: "/ops/stop <agent-name>"
  - name: /ops/costs
    description: Cost report from OTel metrics (if enabled)
  # Schedule Management
  - name: /ops/schedules
    description: Quick schedule overview
  - name: /ops/schedules/list
    description: Detailed list of all schedules with status and history
  - name: /ops/schedules/pause
    description: Pause schedules (optionally for specific agent)
    usage: "/ops/schedules/pause [agent-name]"
  - name: /ops/schedules/resume
    description: Resume paused schedules
    usage: "/ops/schedules/resume [agent-name]"
  # Execution Management
  - name: /ops/executions/list
    description: List recent task executions across agents
    usage: "/ops/executions/list [agent-name] [hours]"
  - name: /ops/executions/status
    description: Get detailed status of a specific execution
    usage: "/ops/executions/status <execution-id>"
  # Compliance & Auditing
  - name: /ops/compatibility-audit
    description: Audit all agents for Trinity compatibility via self-diagnostics
  - name: /ops/service-check
    description: Request agents to validate their runtime setup (read-only diagnostic)
  # Dashboard & Reporting
  - name: /ops/update-dashboard
    description: Update dashboard.yaml with current platform metrics

metrics:
  - name: agents_managed
    type: gauge
    label: "Agents"
    description: "Total agents in the platform"
  - name: agents_healthy
    type: gauge
    label: "Healthy"
    description: "Agents in healthy state"
  - name: agents_unhealthy
    type: gauge
    label: "Unhealthy"
    description: "Agents with issues"
  - name: system_health
    type: status
    label: "Health"
    description: "Overall platform health"
    values:
      - value: "healthy"
        color: "green"
        label: "Healthy"
      - value: "degraded"
        color: "yellow"
        label: "Degraded"
      - value: "critical"
        color: "red"
        label: "Critical"
