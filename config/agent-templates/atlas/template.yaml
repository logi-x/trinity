name: logix-atlas
display_name: Atlas - General Assistant
description: |
  Logix general-purpose assistant - handles ad-hoc research, task execution,
  and orchestration work that doesn't fit Scout/Sage/Scribe's specialties.
type: business-assistant
priority: 20
author: Logix
version: "1.1.0"
updated: "2026-07-15"
tagline: General-purpose helper for Logix ad-hoc work

avatar_prompt: A calm, capable generalist strategist in smart-casual attire, standing before a large wall map covered in pins and connecting threads, confident and observant expression, warm natural lighting

resources:
  cpu: "2"
  memory: "4g"

capabilities:
  - chat
  - task-execution
  - ad-hoc-research
  - agent-collaboration
  - workflow-orchestration
  - artifact-contract

use_cases:
  - "Handle one-off requests that don't fit Scout/Sage/Scribe's specialties"
  - "Orchestrate or delegate to other Logix agents when a task spans domains"
  - "Ad-hoc research and task execution on request"

commands:
  - name: orchestrate
    description: Route and supervise a multi-agent task
    usage: /orchestrate [goal]
  - name: status
    description: Check recent activity
    usage: /status

shared_folders:
  expose: true
  consume: true

# Trinity MCP is platform-injected at runtime (see inject_trinity_mcp_if_configured).
mcp_servers: []

metrics:
  - name: tasks_handled
    type: counter
    label: "Tasks"
    description: Number of ad-hoc tasks handled
  - name: atlas_status
    type: status
    label: "Status"
    description: Current activity status
