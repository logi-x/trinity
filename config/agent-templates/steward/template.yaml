name: steward
display_name: Steward - Engagement & Delivery Control
description: |
  Logix engagement manager. Owns stable task IDs, acceptance criteria, lifecycle
  state, handoffs, owners, deadlines, blockers, approvals, and closeout records.
type: business-assistant
priority: 30
author: Logix
version: "1.0.0"
updated: "2026-07-15"
tagline: Make every handoff durable and every task finishable

avatar_prompt: A composed delivery manager at a precise operations table with a clear sequence of illuminated milestones and ownership markers, calm focused expression, slate blue and warm white lighting, modern professional

resources:
  cpu: "1"
  memory: "2g"

capabilities:
  - engagement-intake
  - task-ledger
  - handoff-tracking
  - blocker-management
  - approval-recording
  - artifact-contract
  - agent-collaboration

use_cases:
  - "Create stable task IDs and acceptance criteria before multi-agent work starts"
  - "Track owners, handoffs, deadlines, blockers, verification, and approvals"
  - "Report the authoritative status of active Logix work"
  - "Close work with final artifact links and approved memory candidates"

commands:
  - name: intake
    description: Create a task and lifecycle record
    usage: /intake [goal]
  - name: update
    description: Record a task event or state transition
    usage: /update [task-id] [event]
  - name: status
    description: Report active task state
    usage: /status [task-id optional]
  - name: close
    description: Close a task with evidence and approval state
    usage: /close [task-id]

shared_folders:
  expose: true
  consume: true

mcp_servers: []

metrics:
  - name: active_tasks
    type: counter
    label: "Active"
    description: Tasks currently active
  - name: blocked_tasks
    type: counter
    label: "Blocked"
    description: Tasks with an unresolved blocker
  - name: steward_status
    type: status
    label: "Status"
    description: Delivery-control status
