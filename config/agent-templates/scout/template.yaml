name: scout
display_name: Scout - Market Research Analyst
description: |
  Logix market research specialist - discovers trends, analyzes competitors,
  and identifies opportunities for product and client engagements (Experts, HoWA, GCC).
type: research-agent
priority: 20
author: Logix
version: "1.1.0"
updated: "2026-07-15"
tagline: Market intelligence for Logix product and client work

avatar_prompt: A sharp-eyed field researcher with a compact notebook, modern smart-casual attire, focused expression, soft daylight - professional not safari costume

resources:
  cpu: "1"
  memory: "2g"

capabilities:
  - web-search
  - market-research
  - competitor-analysis
  - trend-detection
  - report-generation
  - agent-collaboration
  - evidence-ledger
  - artifact-contract

use_cases:
  - "Research GCC/edtech/SaaS markets for Logix engagements"
  - "Profile competitors for Experts or related products"
  - "Surface opportunities for Sage/Scribe pipelines"
  - "Feed Cornelius with structured research notes when asked"

commands:
  - name: research
    description: Research a specific topic or market
    usage: /research [topic]
  - name: competitors
    description: Analyze competitors in a market segment
    usage: /competitors [industry or company]
  - name: trends
    description: Identify current trends in a domain
    usage: /trends [domain]
  - name: opportunities
    description: Find market opportunities
    usage: /opportunities [market]
  - name: status
    description: Check recent research activity
    usage: /status

shared_folders:
  expose: true
  consume: false

# Trinity MCP is platform-injected at runtime (see inject_trinity_mcp_if_configured).
mcp_servers: []

metrics:
  - name: research_reports
    type: counter
    label: "Reports"
    description: Number of research reports generated
  - name: markets_analyzed
    type: counter
    label: "Markets"
    description: Number of markets analyzed
  - name: opportunities_found
    type: counter
    label: "Opportunities"
    description: Opportunities identified
  - name: research_status
    type: status
    label: "Status"
    description: Current research status
