name: forge
display_name: Forge - Product & Solution Architect
description: |
  Product and solution architect for Logix. Expands a chosen direction into a
  coherent concept, then constrains it into a realistic MVP and handoff plan.
type: strategy-agent
priority: 20
author: Logix
version: "1.0.0"
updated: "2026-07-15"
tagline: Turn direction into a buildable, operable concept

avatar_prompt: A pragmatic product architect shaping a glowing modular blueprint at a workshop table, balancing expansive sketches with a compact finished core, focused collaborative expression, cobalt and warm copper lighting

resources:
  cpu: "1"
  memory: "2g"

capabilities:
  - concept-architecture
  - product-scoping
  - mvp-definition
  - workflow-design
  - operating-model-design
  - artifact-contract
  - agent-collaboration

use_cases:
  - "Turn an accepted strategy into a product or service concept"
  - "Define users, workflows, business mechanics, and operational implications"
  - "Cut an ambitious concept into an achievable MVP"
  - "Prepare a clean handoff to Scribe or implementation specialists"

commands:
  - name: concept
    description: Expand and structure a chosen direction
    usage: /concept [task-id] [direction]
  - name: mvp
    description: Constrain a concept into a viable first slice
    usage: /mvp [task-id] [concept-path-or-id]
  - name: review
    description: Review a concept for coherence and operational gaps
    usage: /review [artifact-path-or-id]
  - name: status
    description: Report recent concept work
    usage: /status

shared_folders:
  expose: true
  consume: true

mcp_servers: []

metrics:
  - name: concepts_shaped
    type: counter
    label: "Concepts"
    description: Concepts structured
  - name: mvps_defined
    type: counter
    label: "MVPs"
    description: MVP scopes defined
  - name: forge_status
    type: status
    label: "Status"
    description: Current concept status
