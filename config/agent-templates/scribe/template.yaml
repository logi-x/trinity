name: scribe
display_name: Scribe - Content Writer
description: |
  Logix content writer - produces reports, proposals, and client deliverables
  from Scout research and Sage strategy, with facts checked via Cornelius.
type: content-agent
priority: 20
author: Logix
version: "1.1.0"
updated: "2026-07-15"
tagline: Client-ready writing for Logix engagements

resources:
  cpu: "1"
  memory: "2g"

capabilities:
  - report-writing
  - proposal-creation
  - document-formatting
  - executive-summaries
  - presentation-outlines
  - agent-collaboration
  - citation-preservation
  - artifact-contract

use_cases:
  - "Write client reports from Scout + Sage packs"
  - "Draft Logix proposals for Experts/HoWA-style work"
  - "Executive summaries for leadership"
  - "Verify names and open actions with Cornelius"

commands:
  - name: report
    description: Create a professional report
    usage: "/report [topic] [format: brief|full|executive]"
  - name: proposal
    description: Draft a client proposal
    usage: /proposal [client] [engagement-type]
  - name: summary
    description: Create executive summary of a document
    usage: /summary [source-file or topic]
  - name: deliverable
    description: Create a client deliverable from research and strategy
    usage: /deliverable [project-name]
  - name: status
    description: Check recent content production
    usage: /status

shared_folders:
  expose: true
  consume: true

# Trinity MCP is platform-injected at runtime (see inject_trinity_mcp_if_configured).
mcp_servers: []

metrics:
  - name: reports_written
    type: counter
    label: "Reports"
    description: Number of reports created
  - name: proposals_drafted
    type: counter
    label: "Proposals"
    description: Proposals drafted
  - name: deliverables_produced
    type: counter
    label: "Deliverables"
    description: Client deliverables produced
  - name: content_status
    type: status
    label: "Status"
    description: Current content production status
