# Logix Research Network
# Deploy with: POST /api/systems/deploy
#
# Two-agent research network for Logix:
# - Researcher: Gathers trends on schedule (every 4 hours)
# - Analyst: Synthesizes findings, answers questions (daily briefing)
#
# Usage:
#   curl -X POST http://localhost:8000/api/systems/deploy \
#     -H "Authorization: Bearer YOUR_TOKEN" \
#     -H "Content-Type: application/x-yaml" \
#     --data-binary @config/manifests/research-network.yaml

name: research-network
description: Logix two-agent autonomous research and analysis system

# System-wide instructions (injected into all agents)
prompt: |
  You are part of the Logix Research Network - an autonomous system for discovering
  and analyzing opportunities relevant to Logix (Experts, HoWA, GCC SaaS, AI agents).

  Key principles:
  - Be thorough but concise in reports
  - Always cite sources
  - Flag high-priority findings clearly
  - Maintain consistent formatting
  - Prefer Logix-scoped relevance; ask cornelius for institutional facts when permitted

agents:
  researcher:
    template: local:demo-researcher
    resources:
      cpu: "1"
      memory: "2g"
    folders:
      expose: true
      consume: false
    schedules:
      - name: research-cycle
        cron: "0 */4 * * *"
        message: "/research"
        timezone: UTC

  analyst:
    template: local:demo-analyst
    resources:
      cpu: "1"
      memory: "2g"
    folders:
      expose: false
      consume: true
    schedules:
      - name: daily-briefing
        cron: "0 9 * * *"
        message: "/briefing"
        timezone: UTC

permissions:
  preset: full-mesh
