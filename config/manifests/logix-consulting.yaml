# Logix Consulting Fleet
# LIVING ROSTER - the declared source of truth for fleet topology.
# Permissions here are applied by scripts/reconcile-permissions.py, NOT by re-deploying
# this manifest (a redeploy may duplicate running agents - see the migration plan, R1).
# Topology: hub-and-spoke. See logix-agents/docs/superpowers/specs/2026-07-16-fleet-coordination-topology-design.md

name: logix
description: Logix Consulting AI Team - governed research, strategy, concepts, and deliverables

agents:
  atlas:
    template: github:logi-x/logix-atlas
    folders:
      expose: true
      consume: true
    resources:
      memory: 4g
      cpu: "2"

  scout:
    template: github:logi-x/logix-scout
    folders:
      expose: true
      consume: false
    resources:
      memory: 2g
      cpu: "1"

  sage:
    template: github:logi-x/logix-sage
    folders:
      expose: true
      consume: true
    resources:
      memory: 2g
      cpu: "1"

  scribe:
    template: github:logi-x/logix-scribe
    folders:
      expose: true
      consume: true
    resources:
      memory: 2g
      cpu: "1"

  sentinel:
    template: github:logi-x/logix-sentinel
    folders:
      expose: true
      consume: true
    resources:
      memory: 2g
      cpu: "1"

  forge:
    template: github:logi-x/logix-forge
    folders:
      expose: true
      consume: true
    resources:
      memory: 2g
      cpu: "1"

  experts:
    template: github:logi-x/experts
    folders:
      expose: true
      consume: true
    resources:
      memory: 8g
      cpu: "4"

permissions:
  explicit:
    # Hub: the only agent that reaches stages. Discovers workers at runtime.
    atlas:    [scout, sentinel, sage, forge, scribe, experts, logix-cornelius]
    # Stages: identical rows. Oracles only, never each other.
    scout:    [logix-cornelius, experts]
    sentinel: [logix-cornelius, experts]
    sage:     [logix-cornelius, experts]
    forge:    [logix-cornelius, experts]
    scribe:   [logix-cornelius, experts]
    # Oracles: reach only lower oracles. logix-cornelius reaches nothing.
    # Members use short names (prefixed at deploy); non-members use their full deployed name.
    experts:  [logix-cornelius]

auto_start: true

trinity_prompt: |
  You are part of the Logix consulting AI team.

  The fleet is hub-and-spoke:
  - Atlas (logix-atlas) is the hub. It sequences work and is the only agent that calls stages.
  - Stages do a step of the work and return to the hub: Scout (research), Sentinel (verification),
    Sage (strategy), Forge (concept), Scribe (deliverable). Stages never call each other.
  - Oracles answer questions and never call back: Cornelius (logix-cornelius) for institutional memory,
    Experts (logix-experts) for specialist packs.

  Collaborate effectively:
  1. Atlas opens an engagement pipeline instance before multi-stage work; its instance_id is the task ID
  2. Follow contracts/ARTIFACT-CONTRACT.md for every handoff
  3. If you need another stage's work, say so in your output and return - do not call it
  4. Consult Cornelius for known Logix client/org facts before inventing them
  5. Route factual research through Sentinel before strategy uses it
  6. Route final evidence-bearing deliverables through Sentinel before approval
  7. Never overwrite a revision - increment rN and set supersedes
  8. Promote only approved facts, decisions, and final artifacts into Cornelius
