# Logix Consulting Fleet
# OPTIONAL greenfield / DR recipe — not a living roster.
# Day-to-day: onboard agents from github.com/logi-x/logix-* under /home/logix/logix-agents.
#
# Templates use GitHub so recreate does not depend on config/agent-templates/*.
# GitHub refs are source templates only. After deployment, initialize each agent
# with its own trinity/<agent>/<instance> working branch; do not run on main.
# Post-deploy (manifest full-mesh is only among agents listed below):
#   POST /api/agents/{each}/permissions/cornelius

name: logix
description: Logix Consulting AI Team - governed research, strategy, concepts, and deliverables

agents:
  atlas:
    template: github:logi-x/logix-atlas
    folders:
      expose: true
      consume: true
    resources:
      memory: 4g
      cpu: "2"

  scout:
    template: github:logi-x/logix-scout
    folders:
      expose: true
      consume: false
    resources:
      memory: 2g
      cpu: "1"

  sage:
    template: github:logi-x/logix-sage
    folders:
      expose: true
      consume: true
    resources:
      memory: 2g
      cpu: "1"

  scribe:
    template: github:logi-x/logix-scribe
    folders:
      expose: true
      consume: true
    resources:
      memory: 2g
      cpu: "1"

  sentinel:
    template: github:logi-x/logix-sentinel
    folders:
      expose: true
      consume: true
    resources:
      memory: 2g
      cpu: "1"

  steward:
    template: github:logi-x/logix-steward
    folders:
      expose: true
      consume: true
    resources:
      memory: 2g
      cpu: "1"

  forge:
    template: github:logi-x/logix-forge
    folders:
      expose: true
      consume: true
    resources:
      memory: 2g
      cpu: "1"

  experts:
    template: github:logi-x/experts
    folders:
      expose: true
      consume: true
    resources:
      memory: 8g
      cpu: "4"

permissions:
  preset: full-mesh

auto_start: true

trinity_prompt: |
  You are part of the Logix consulting AI team.

  Team members (agent names from this manifest):
  - Atlas (logix-atlas): General assistant / orchestrator
  - Scout (logix-scout): Market research analyst
  - Sage (logix-sage): Strategic advisor
  - Scribe (logix-scribe): Content writer
  - Sentinel (logix-sentinel): Evidence and final-deliverable verifier
  - Steward (logix-steward): Task ledger, lifecycle, blockers, and approvals
  - Forge (logix-forge): Product and solution concept architect
  - Experts (logix-experts): On-demand specialist packs for payments, Saudi compliance, Arabic/RTL, SEO, operations, security, monetization, and accessibility
  - Cornelius (cornelius): Second brain / institutional memory (when present)

  Collaborate effectively:
  1. Obtain a stable task ID from Steward before multi-stage work
  2. Follow contracts/ARTIFACT-CONTRACT.md for every handoff
  3. Prefer specialists for their domain; Atlas handles ad-hoc and multi-domain routing
  4. Check shared folders and use Trinity MCP to communicate with teammates
  5. Route factual research through Sentinel before strategy uses it
  6. Route final evidence-bearing deliverables through Sentinel before approval
  7. Ask Cornelius for known Logix client/org facts before inventing them
  8. Promote only approved facts, decisions, and final artifacts into Cornelius
